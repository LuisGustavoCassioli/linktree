<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal_Linktree</title>

    <!-- Google Fonts: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgTerminal: '#0d0d0d',
                        fgTerminal: '#00ff41'
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-bgTerminal min-h-screen text-fgTerminal font-mono antialiased flex flex-col items-center py-12 px-4 selection:bg-fgTerminal selection:text-bgTerminal"
    x-data="profileData()">

    <!-- Header: Perfil -->
    <header class="flex flex-col items-center mb-8 text-center w-full max-w-md">
        <img src="images/profile.png " alt="avatar"
            class="w-32 h-32 mb-6 border-2 border-fgTerminal grayscale hover:grayscale-0 transition duration-300 object-cover">

        <h1 class="text-2xl font-bold mb-2 tracking-widest lowercase glitch-title h-8">
            <span id="typed-name"></span>
        </h1>
<br><br>
        <div class="text-fgTerminal/80 max-w-md text-sm tracking-wider lowercase h-12">
            <span id="typed-bio"></span>
        </div>

        <div class="mt-8 mb-4 text-fgTerminal/50 tracking-[0.5em] font-bold">
            &lt; / &gt;
        </div>
    </header>

    <!-- Main: Links -->
    <main class="w-full max-w-md flex flex-col gap-4" id="links-container" aria-label="lista de links">
        <template x-for="(link, index) in profile.links" :key="index">
            <a :href="link.url" target="_blank" rel="noopener noreferrer"
                class="link-card block w-full bg-transparent border-2 border-fgTerminal p-4 text-left font-bold text-sm tracking-widest lowercase transition-colors duration-150 hover:bg-fgTerminal hover:text-bgTerminal focus:outline-none focus:bg-fgTerminal focus:text-bgTerminal">
                > <span x-text="link.title"></span>_
            </a>
        </template>
    </main>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Typed.js -->
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>

    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
